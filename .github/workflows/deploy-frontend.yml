name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/Frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write  # SWA action comments on PRs for preview envs (future)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - name: Publish Blazor WASM
        # Oryx (used by the SWA action) cannot build Blazor WASM — publish explicitly first.
        run: dotnet publish src/Frontend/AHKFlowApp.UI.Blazor --configuration Release --output publish
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: publish/wwwroot
          output_location: ''
          skip_app_build: true
