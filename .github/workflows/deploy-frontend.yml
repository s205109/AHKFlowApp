name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/Frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - test
          - prod
        default: 'test'

permissions:
  contents: read
  id-token: write
  pull-requests: write  # SWA action comments on PRs for preview envs (future)

env:
  # Determine target environment: manual trigger uses input, push to main uses test
  TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test' }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      ENV_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'test' && 'TEST' || 'PROD') || 'TEST' }}
      APPSETTINGS_ENV: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' && 'Production' || 'Test') || 'Test' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - name: Substitute appsettings placeholders
        env:
          API_BASE_URL: ${{ secrets[format('AZURE_API_BASE_URL_{0}', env.ENV_SUFFIX)] }}
          AD_TENANT_ID: ${{ vars[format('AZURE_AD_TENANT_ID_{0}', env.ENV_SUFFIX)] }}
          AD_CLIENT_ID: ${{ vars[format('AZURE_AD_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          AD_DEFAULT_SCOPE: ${{ vars[format('AZURE_AD_DEFAULT_SCOPE_{0}', env.ENV_SUFFIX)] }}
        run: |
          file="src/Frontend/AHKFlowApp.UI.Blazor/wwwroot/appsettings.${APPSETTINGS_ENV}.json"
          sed -i "s|#{AZURE_API_BASE_URL}#|${API_BASE_URL}|g" "$file"
          sed -i "s|#{AZURE_AD_TENANT_ID}#|${AD_TENANT_ID}|g" "$file"
          sed -i "s|#{AZURE_AD_CLIENT_ID}#|${AD_CLIENT_ID}|g" "$file"
          sed -i "s|#{AZURE_AD_DEFAULT_SCOPE}#|${AD_DEFAULT_SCOPE}|g" "$file"
      - name: Publish Blazor WASM
        # Oryx (used by the SWA action) cannot build Blazor WASM — publish explicitly first.
        # .NET 10 bakes the Blazor WASM environment in at publish time via WasmApplicationEnvironmentName
        # (the blazor-environment HTTP header is no longer read by standalone WASM).
        run: dotnet publish src/Frontend/AHKFlowApp.UI.Blazor --configuration Release --output publish -p:WasmApplicationEnvironmentName=${{ env.APPSETTINGS_ENV }}
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[format('AZURE_STATIC_WEB_APPS_API_TOKEN_{0}', env.ENV_SUFFIX)] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: publish/wwwroot
          output_location: ''
          skip_app_build: true
