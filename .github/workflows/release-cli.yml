name: Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to package, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      checkout-ref: ${{ steps.tag.outputs.checkout-ref }}
    steps:
      - name: Validate release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v.+ ]]; then
            echo "Release tag must start with 'v'. Received: $RELEASE_TAG" >&2
            exit 1
          fi

          if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" > /dev/null; then
            echo "Release tag does not exist: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "checkout-ref=refs/tags/$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.checkout-ref }}
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  package:
    needs: [validate, test]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.checkout-ref }}
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Package Windows CLI
        shell: pwsh
        env:
          API_BASE_URL: ${{ secrets.AZURE_API_BASE_URL_PROD }}
          AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID_PROD }}
          AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID_PROD }}
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:API_BASE_URL)) {
              throw "Required secret AZURE_API_BASE_URL_PROD is missing or whitespace."
          }

          if ([string]::IsNullOrWhiteSpace($env:AD_CLIENT_ID)) {
              throw "Required variable AZURE_AD_CLIENT_ID_PROD is missing or whitespace."
          }

          if ([string]::IsNullOrWhiteSpace($env:AD_TENANT_ID)) {
              throw "Required variable AZURE_AD_TENANT_ID_PROD is missing or whitespace."
          }

          .\scripts\publish-cli.ps1 `
              -ApiBaseUrl $env:API_BASE_URL `
              -ClientId $env:AD_CLIENT_ID `
              -TenantId $env:AD_TENANT_ID `
              -OutputDirectory .artifacts
      - name: Verify package
        shell: pwsh
        env:
          API_BASE_URL: ${{ secrets.AZURE_API_BASE_URL_PROD }}
          AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID_PROD }}
          AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID_PROD }}
        run: |
          $ErrorActionPreference = "Stop"

          $zipPath = Resolve-Path -LiteralPath ".artifacts\ahkflow-win-x64.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "ahkflow-cli"

          if (Test-Path -LiteralPath $extractPath) {
              Remove-Item -LiteralPath $extractPath -Recurse -Force
          }

          New-Item -Path $extractPath -ItemType Directory | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath

          $expectedFiles = @("ahkflow.exe", "appsettings.json", "INSTALL.md")
          $actualRootFiles = @(Get-ChildItem -LiteralPath $extractPath -File | Select-Object -ExpandProperty Name)
          $missingFiles = @($expectedFiles | Where-Object { $_ -notin $actualRootFiles })

          $allItemPaths = @(
              Get-ChildItem -LiteralPath $extractPath -Recurse -Force |
                  ForEach-Object { [System.IO.Path]::GetRelativePath($extractPath, $_.FullName) }
          )
          $extraItems = @($allItemPaths | Where-Object { $_ -notin $expectedFiles })

          if ($missingFiles.Count -gt 0 -or $extraItems.Count -gt 0) {
              throw "Package contents mismatch. Missing root files: $($missingFiles -join ', '); Extra items: $($extraItems -join ', ')"
          }

          $settingsPath = Join-Path $extractPath "appsettings.json"
          $settings = Get-Content -LiteralPath $settingsPath -Raw | ConvertFrom-Json

          if ($settings.ApiBaseUrl -ne ($env:API_BASE_URL).TrimEnd("/")) {
              throw "appsettings.json ApiBaseUrl does not match the configured production API URL."
          }

          if ([guid]$settings.ClientId -ne [guid]$env:AD_CLIENT_ID) {
              throw "appsettings.json ClientId does not match AZURE_AD_CLIENT_ID_PROD."
          }

          if ([guid]$settings.TenantId -ne [guid]$env:AD_TENANT_ID) {
              throw "appsettings.json TenantId does not match AZURE_AD_TENANT_ID_PROD."
          }

          if ($settings.ApiBaseUrl -match "placeholder-prod") {
              throw "appsettings.json ApiBaseUrl must not contain placeholder-prod."
          }

          if ($settings.ClientId -eq "00000000-0000-0000-0000-000000000000") {
              throw "appsettings.json ClientId must not be an all-zero GUID."
          }

          if ($settings.TenantId -eq "00000000-0000-0000-0000-000000000000") {
              throw "appsettings.json TenantId must not be an all-zero GUID."
          }

          & (Join-Path $extractPath "ahkflow.exe") --help
          if ($LASTEXITCODE -ne 0) {
              throw "ahkflow.exe --help failed with exit code $LASTEXITCODE."
          }

          # Drop only the +build metadata from the tag. Pre-release components
          # (e.g. -rc.1) MUST be preserved so the gate compares full SemVer
          # identity, not just MAJOR.MINOR.PATCH; otherwise a v0.1.3-rc.1 tag
          # would accept a binary reporting 0.1.3-beta.9.
          $expectedVersion = ($env:RELEASE_TAG.TrimStart("v") -replace '\+.*$', '')

          # Capture stdout only. The CLI configures Serilog to write to stderr,
          # so any future startup banner on stderr must not be allowed to push
          # the version line past our parser (which is why we do NOT use 2>&1).
          $versionOutput = & (Join-Path $extractPath "ahkflow.exe") --version
          if ($LASTEXITCODE -ne 0) {
              throw "ahkflow.exe --version failed with exit code $LASTEXITCODE."
          }

          $versionText = ($versionOutput -join "`n")

          # Capture MAJOR.MINOR.PATCH plus optional -prerelease (group 1),
          # discarding any trailing +build metadata. The full SemVer identity
          # is what we compare against the tag.
          if ($versionText -notmatch '\b(\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)(?:\+[0-9A-Za-z.-]+)?') {
              throw "Could not find a SemVer token in --version output. Raw output: '$versionText'"
          }

          $actualVersion = $Matches[1]
          if ($actualVersion -ne $expectedVersion) {
              throw "Version mismatch. Tag: $expectedVersion. Binary reports: $actualVersion. Expected the binary's InformationalVersion to match the tag (sans 'v')."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: ahkflow-win-x64
          path: .artifacts/ahkflow-win-x64.zip
          retention-days: 30
      - name: Publish GitHub Release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = Resolve-Path -LiteralPath ".artifacts\ahkflow-win-x64.zip"

          gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -ne 0) {
              gh release create $env:RELEASE_TAG $zipPath --verify-tag --title $env:RELEASE_TAG --notes "AHKFlow CLI Windows x64 release."
              if ($LASTEXITCODE -ne 0) {
                  throw "gh release create failed with exit code $LASTEXITCODE."
              }
          }
          else {
              $assetName = Split-Path $zipPath -Leaf

              # Reaching this branch means the outer `gh release view` succeeded,
              # so the release definitely exists. A failure to enumerate its
              # assets here is therefore an auth/API/transient error, not a
              # signal that the release is empty. Treat any non-zero exit as
              # fatal — silently falling through would risk overwriting an
              # already-published asset via the unconditional `gh release upload`
              # below, breaking the immutability promise this step exists to keep.
              $existingAssets = gh release view $env:RELEASE_TAG --json assets --jq ".assets[].name"
              if ($LASTEXITCODE -ne 0) {
                  throw "Could not enumerate assets for tag $($env:RELEASE_TAG) (gh release view exit code $LASTEXITCODE). Refusing to upload without knowing the current asset state."
              }

              if ($existingAssets -split "`n" -contains $assetName) {
                  throw "Release asset '$assetName' is already published for tag $($env:RELEASE_TAG). Treating release assets as immutable. To ship a new build, cut a new tag."
              }

              gh release upload $env:RELEASE_TAG $zipPath
              if ($LASTEXITCODE -ne 0) {
                  throw "gh release upload failed with exit code $LASTEXITCODE."
              }
          }
