name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full history for version derivation
      - name: Verify changelog asset
        # Requires PowerShell 7 (pwsh); available on GitHub-hosted runners
        run: pwsh ./scripts/ci/generate-changelog-json.ps1 -Check
      - name: Detect non-docs changes
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!.claude/**'
      - name: Skip notice (docs-only PR)
        if: steps.filter.outputs.code == 'false'
        run: echo "Docs-only changes detected — skipping build, test, and coverage." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/setup-dotnet@v4
        if: steps.filter.outputs.code == 'true'
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'
      - if: steps.filter.outputs.code == 'true'
        run: dotnet restore
      - if: steps.filter.outputs.code == 'true'
        run: dotnet build --configuration Release --no-restore
      - name: CLI --help smoke test
        if: steps.filter.outputs.code == 'true'
        run: dotnet run --project src/Tools/AHKFlowApp.CLI --no-build --configuration Release -- --help
      - name: CLI hotstring --help smoke test
        if: steps.filter.outputs.code == 'true'
        run: dotnet run --project src/Tools/AHKFlowApp.CLI --no-build --configuration Release -- hotstring --help
      - name: Test with coverage
        if: steps.filter.outputs.code == 'true'
        run: >
          dotnet test --configuration Release --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
          --settings coverlet.runsettings
      - name: Merge coverage reports
        if: always() && steps.filter.outputs.code == 'true'
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.0
        with:
          reports: 'TestResults/**/coverage.cobertura.xml'
          targetdir: 'CoverageReport'
          reporttypes: 'MarkdownSummaryGithub;JsonSummary;HtmlInline_AzurePipelines;Cobertura'
      - name: Append coverage guidance to summary
        if: always() && steps.filter.outputs.code == 'true'
        run: |
          mkdir -p CoverageReport
          python scripts/ci/check-coverage-thresholds.py --github-summary-footer >> CoverageReport/SummaryGithub.md
      - name: Append coverage summary to job summary
        if: always() && steps.filter.outputs.code == 'true'
        run: cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
      - name: Publish test results
        if: always() && steps.filter.outputs.code == 'true'
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        with:
          files: 'TestResults/**/*.trx'
      - name: Sticky coverage comment
        if: always() && steps.filter.outputs.code == 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: CoverageReport/SummaryGithub.md
      - name: Upload coverage artifacts
        if: always() && steps.filter.outputs.code == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            CoverageReport
            TestResults/**/*.trx
          retention-days: 14
      - name: Enforce per-assembly coverage thresholds
        if: always() && steps.filter.outputs.code == 'true'
        run: python scripts/ci/check-coverage-thresholds.py
      - if: steps.filter.outputs.code == 'true'
        run: dotnet format AHKFlowApp.slnx --verify-no-changes

  worktree-powershell-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run worktree PowerShell tests
        shell: pwsh
        run: |
          ./tests/WorktreePowerShellHost.Tests.ps1
          ./tests/WorktreeMergedCleanup.Tests.ps1
          ./tests/WorktreeRemoveHook.Tests.ps1
          ./tests/WorktreeLocalDevSetup.Tests.ps1

  bicep-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Bicep
        run: az bicep build --file infra/main.bicep
