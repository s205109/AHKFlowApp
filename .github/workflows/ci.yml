name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full history for version derivation
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - name: Test with coverage
        run: >
          dotnet test --configuration Release --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
          --settings coverlet.runsettings
      - name: Merge coverage reports
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.0
        with:
          reports: 'TestResults/**/coverage.cobertura.xml'
          targetdir: 'CoverageReport'
          reporttypes: 'MarkdownSummaryGithub;JsonSummary;HtmlInline_AzurePipelines;Cobertura'
      - name: Append thresholds to coverage summary
        if: always()
        run: printf '\n---\n**Per-assembly thresholds:** Domain/Application line ≥ 85%% branch ≥ 70%% · Infrastructure line ≥ 70%% branch ≥ 50%% · API line ≥ 75%% branch ≥ 55%% · UI.Blazor line ≥ 65%% branch ≥ 45%%\n' >> CoverageReport/SummaryGithub.md
      - name: Append coverage summary to job summary
        if: always()
        run: cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        with:
          files: 'TestResults/**/*.trx'
      - name: Sticky coverage comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: CoverageReport/SummaryGithub.md
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            CoverageReport
            TestResults/**/*.trx
          retention-days: 14
      - name: Enforce per-assembly coverage thresholds
        if: always()
        run: python scripts/check-coverage-thresholds.py
      - run: dotnet format --verify-no-changes

  bicep-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Bicep
        run: az bicep build --file infra/main.bicep
