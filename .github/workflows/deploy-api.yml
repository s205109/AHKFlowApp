name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/Backend/**'
      - 'tests/**'
      - 'Directory.*.props'
      - 'global.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - test
          - prod
        default: 'test'

permissions:
  contents: read
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ahkflowapp-api
  # Determine target environment: manual trigger uses input, push to main uses test
  TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build

  build-push-image:
    needs: build-test
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: echo "environment=${{ env.TARGET_ENV }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: docker/setup-buildx-action@v3  # Required for type=gha cache backend below
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest-${{ env.TARGET_ENV }},enable={{is_default_branch}}
            type=raw,value=${{ env.TARGET_ENV }}-{{date 'YYYYMMDD-HHmmss'}}
            type=ref,event=branch
      - name: Calculate version with MinVer
        id: minver
        run: |
          dotnet tool install --global minver-cli
          version=$(minver --tag-prefix v)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "MinVer version: $version"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Backend/AHKFlowApp.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MINVER_VERSION=${{ steps.minver.outputs.version }}
      - name: Verify digest is set
        run: |
          digest="${{ steps.build.outputs.digest }}"
          test -n "$digest" || { echo "docker/build-push-action produced an empty digest — deploy would deploy a stale image"; exit 1; }
          echo "Digest: $digest"
      - id: image-ref
        # Deploy uses the immutable digest so re-running an old workflow run redeploys
        # exactly that run's image — true rollback by re-run.
        run: echo "value=${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  migrate-db:
    # Sequential after image push so `deploy` has a clean linear dependency chain.
    # If migration fails, the image is still in GHCR (harmless, garbage-collected later).
    needs: build-push-image
    runs-on: ubuntu-latest
    env:
      ENV_SUFFIX: ${{ needs.build-push-image.outputs.environment == 'test' && 'TEST' || 'PROD' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Add runner IP to SQL firewall
        run: |
          runner_ip=$(curl -s https://api.ipify.org)
          az sql server firewall-rule create \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}" \
            --server "${{ vars[format('SQL_SERVER_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --name "gh-runner-${GITHUB_RUN_ID}" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip"
      - name: Derive EF Core version from Directory.Packages.props
        id: ef
        run: |
          # Microsoft.EntityFrameworkCore.Design version === dotnet-ef tool version we need.
          ef_version=$(grep -oE 'Include="Microsoft\.EntityFrameworkCore\.Design"[[:space:]]+Version="[^"]+"' Directory.Packages.props \
            | grep -oE 'Version="[^"]+"' | head -n1 | cut -d'"' -f2)
          test -n "$ef_version" || { echo "Could not find Microsoft.EntityFrameworkCore.Design version in Directory.Packages.props"; exit 1; }
          echo "version=$ef_version" >> "$GITHUB_OUTPUT"
          echo "Using dotnet-ef $ef_version"
      - name: Apply migrations via dotnet ef database update
        env:
          ConnectionStrings__DefaultConnection: >-
            Server=tcp:${{ vars[format('SQL_SERVER_FQDN_{0}', env.ENV_SUFFIX)] }},1433;
            Database=${{ vars[format('SQL_DATABASE_NAME_{0}', env.ENV_SUFFIX)] }};
            Authentication=Active Directory Default;
            Encrypt=True;
            TrustServerCertificate=False;
            Connection Timeout=30;
          AZURE_CLIENT_ID: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          dotnet restore
          dotnet tool install --global dotnet-ef --version "${{ steps.ef.outputs.version }}"
          dotnet ef database update \
            --project src/Backend/AHKFlowApp.Infrastructure \
            --startup-project src/Backend/AHKFlowApp.API
      - name: Remove runner IP from SQL firewall
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}" \
            --server "${{ vars[format('SQL_SERVER_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --name "gh-runner-${GITHUB_RUN_ID}" || true

  deploy:
    needs: [build-push-image, migrate-db]
    runs-on: ubuntu-latest
    env:
      ENV_SUFFIX: ${{ needs.build-push-image.outputs.environment == 'test' && 'TEST' || 'PROD' }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Set container image on App Service
        run: |
          az webapp config container set \
            --name "${{ vars[format('APP_SERVICE_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}" \
            --container-image-name "${{ needs.build-push-image.outputs.image-ref }}" \
            --container-registry-url "https://ghcr.io"
          az webapp restart \
            --name "${{ vars[format('APP_SERVICE_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}"
      - name: Health check
        # 12 x 15s = 3 minutes. Covers Entra propagation + container cold start.
        run: |
          url="https://${{ vars[format('APP_SERVICE_NAME_{0}', env.ENV_SUFFIX)] }}.azurewebsites.net/health"
          for i in $(seq 1 12); do
            if curl -fsS "$url"; then exit 0; fi
            echo "Attempt $i/12 failed, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 3 minutes. Check App Service logs: az webapp log tail ..."
          exit 1
