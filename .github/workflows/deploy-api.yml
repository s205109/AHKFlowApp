name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/Backend/**'
      - 'tests/**'
      - 'Directory.*.props'
      - 'global.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - test
          - prod
        default: 'test'

permissions:
  contents: read
  id-token: write

env:
  TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test' }}

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build
      - name: Publish API
        run: dotnet publish src/Backend/AHKFlowApp.API --configuration Release --no-build --output publish
      - name: Create deploy package
        run: |
          cd publish
          zip -r ../api-package.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: api-package.zip

  migrate-db:
    needs: build-test-publish
    runs-on: ubuntu-latest
    env:
      ENV_SUFFIX: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test') == 'test' && 'TEST' || 'PROD' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with: { global-json-file: global.json }
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Add runner IP to SQL firewall
        run: |
          runner_ip=$(curl -s https://api.ipify.org)
          az sql server firewall-rule create \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}" \
            --server "${{ vars[format('SQL_SERVER_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --name "gh-runner-${GITHUB_RUN_ID}" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip"
      - name: Derive EF Core version from Directory.Packages.props
        id: ef
        run: |
          ef_version=$(grep -oE 'Include="Microsoft\.EntityFrameworkCore\.Design"[[:space:]]+Version="[^"]+"' Directory.Packages.props \
            | grep -oE 'Version="[^"]+"' | head -n1 | cut -d'"' -f2)
          test -n "$ef_version" || { echo "Could not find Microsoft.EntityFrameworkCore.Design version in Directory.Packages.props"; exit 1; }
          echo "version=$ef_version" >> "$GITHUB_OUTPUT"
          echo "Using dotnet-ef $ef_version"
      - name: Apply migrations via dotnet ef database update
        env:
          ConnectionStrings__DefaultConnection: >-
            Server=tcp:${{ vars[format('SQL_SERVER_FQDN_{0}', env.ENV_SUFFIX)] }},1433;
            Database=${{ vars[format('SQL_DATABASE_NAME_{0}', env.ENV_SUFFIX)] }};
            Authentication=Active Directory Default;
            Encrypt=True;
            TrustServerCertificate=False;
            Connection Timeout=30;
          AZURE_CLIENT_ID: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          dotnet restore
          dotnet tool install --global dotnet-ef --version "${{ steps.ef.outputs.version }}"
          dotnet ef database update \
            --project src/Backend/AHKFlowApp.Infrastructure \
            --startup-project src/Backend/AHKFlowApp.API
      - name: Remove runner IP from SQL firewall
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}" \
            --server "${{ vars[format('SQL_SERVER_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --name "gh-runner-${GITHUB_RUN_ID}" || true

  deploy:
    needs: [build-test-publish, migrate-db]
    runs-on: ubuntu-latest
    env:
      ENV_SUFFIX: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test') == 'test' && 'TEST' || 'PROD' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-package
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets[format('AZURE_CLIENT_ID_{0}', env.ENV_SUFFIX)] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy package to App Service
        run: |
          az webapp deploy \
            --name "${{ vars[format('APP_SERVICE_NAME_{0}', env.ENV_SUFFIX)] }}" \
            --resource-group "${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}" \
            --src-path api-package.zip \
            --type zip \
            --restart true \
            --clean true
      - name: Health check
        run: |
          url="https://${{ vars[format('APP_SERVICE_NAME_{0}', env.ENV_SUFFIX)] }}.azurewebsites.net/health"
          for i in $(seq 1 20); do
            if curl -fsS "$url"; then exit 0; fi
            echo "Attempt $i/20 failed, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 minutes. App Service Free can cold-start slowly; inspect logs with: az webapp log tail --name ${{ vars[format('APP_SERVICE_NAME_{0}', env.ENV_SUFFIX)] }} --resource-group ${{ vars[format('AZURE_RESOURCE_GROUP_{0}', env.ENV_SUFFIX)] }}"
          exit 1
